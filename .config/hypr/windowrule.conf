# 1. Ignore maximize requests from all apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# 2. Fix some dragging issues with XWayland
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# 3. Hyprland-run windowrule
windowrulev2 = float, class:^(hyprland-run)$
# Anmerkung: "monitor_h-120" gibt es so nicht. "100%-120" setzt es 120 Pixel über den unteren Rand.
windowrulev2 = move 20 100%-120, class:^(hyprland-run)$

# 4. Warpaper Live
# In deiner alten Config fehlte hier die "match"-Bedingung. 
# Ich gehe davon aus, dass das Programm als class "warpaper_live" läuft.
windowrulev2 = float, class:^(warpaper_live)$
windowrulev2 = pin, class:^(warpaper_live)$
windowrulev2 = noshadow, class:^(warpaper_live)$
windowrulev2 = nofocus, class:^(warpaper_live)$
windowrulev2 = noinitialfocus, class:^(warpaper_live)$
windowrulev2 = noanim, class:^(warpaper_live)$
windowrulev2 = size 100% 100%, class:^(warpaper_live)$
windowrulev2 = center, class:^(warpaper_live)$
windowrulev2 = noblur, class:^(warpaper_live)$
windowrulev2 = nodim, class:^(warpaper_live)$

