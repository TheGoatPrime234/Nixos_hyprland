background {
    monitor =
    path = /home/cato/Bilder/wall.jpg 
    blur_passes = 2 # Macht den Hintergrund schön unscharf
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33 
    dots_spacing = 0.15 
    dots_center = true
    outer_color = rgb(15, 15, 15)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = false
    placeholder_text = <i>Passwort...</i> 
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 50
    font_family = FiraCode Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
