background {
    monitor =
    path = /home/cato/.config/rice/wallpaper/dracula2.jpg   
    blur_passes = 2 
    blur_size = 7
}

label {
    monitor =
    text = $TIME
    color = rgb(cdd6f4) # Catppuccin Text-Farbe
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, 150
    halign = center
    valign = center
    animation = fadeOut, 1, 0.5, linear 
}

image {
    monitor =
    path = /home/cato/.config/rice/face/nix_face.png 
    size = 120
    border_size = 2
    border_color = rgb(cba6f7) # Catppuccin Mauve
    
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    outer_color = rgb(cba6f7) # Catppuccin Mauve
    inner_color = rgb(1e1e2e) # Catppuccin Base (Dunkel)
    font_color = rgb(cdd6f4)  # Helle Schrift
    
    fade_on_empty = false
    placeholder_text = <i>Passwort...</i>
    hide_input = false
    
    position = 0, -100
    halign = center
    valign = center
}
