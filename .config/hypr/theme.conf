#########################################
# HYPRLAND LOOK & FEEL (Minimalist Rice) #
#########################################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    resize_on_border = true
    layout = dwindle # Behält das Kachel-Layout bei
}

decoration {
    rounding = 15
    active_opacity = 0.8
    inactive_opacity = 0.50

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = false
        xray = false
    }
    shadow {
    	enabled = true
    	color = rgba(bd93f977)
    	color_inactive = rgba(8be9fd77)
	range = 8
	offset = 1 1  
    }
}

# Animationen: Wir machen sie "crisp" und schnell, nicht zu verspielt
animations {
    enabled = yes
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 4, easeOutExpo, popin 80%
    animation = windowsOut, 1, 4, easeOutExpo, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, easeOutExpo, slide
}

misc {
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# Layout-spezifische Einstellungen
dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

master {
    new_status = master
}
